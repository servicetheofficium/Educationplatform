<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="95" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="black" stroke-width="1"/>

  <!-- KNC center -->
  <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="black">KNC</text>

  <!-- Top arc path (left → right, sweeping upward) -->
  <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="black">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      โรงเรียนสอนภาษาเคเอ็นซี
    </textPath>
  </text>

  <!-- Bottom arc path (right → left, sweeping downward = CW through bottom) -->
  <!-- Text reads left-to-right by reversing path direction, then centering -->
  <path id="bottomArc" d="M 178,100 A 78,78 0 0,1 22,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      KNC LANGUAGE SCHOOL
    </textPath>
  </text>
</svg>
